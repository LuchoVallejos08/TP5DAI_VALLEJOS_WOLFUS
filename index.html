<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Benvenutti a la Tatodex</h1>
        <h3>Molto Benne</h3>
    </header>

    <main>

        <form action="">
            <input type="text" id="ingreso" placeholder="Buscá un pokémon...">
            <button type="button" id="btnBuscar">Buscar</button>
        </form>

        <div id="resultado" style="display: none;">
            <img id="pokeImagen" src="" alt="">
            <h1 id="pokeNombre"></h1>
            <h2 id="pokeId"></h2>
            <h2 id="pokeTipos"></h2>
            <h2 id="pokePeso"></h2>
            <h2 id="pokeAltura"></h2>
        </div>

        <p id="error" style="display: none;">No se encontró el pokémon.</p>

    </main>

    <footer></footer>

    <script src="script.js"></script>
</body>
</html>
