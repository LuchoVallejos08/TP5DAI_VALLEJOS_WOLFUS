<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
      <header>
          <h1>Benvenutti a la Tatodex</h1>
          <h3>Molto Benne</h3>
      </header>

      <main>

          <form action="">
              <input type="text" id="ingreso" placeholder="Buscá un pokémon...">
              <button type="button" id="btnBuscar" onclick=obtenerDatos()>Buscar</button>
          </form>

          <div id="resultado" style="display: none;">
              <div id="resultadoCard">
                <img id="pokeImagen" src="" alt="">
                <div class="meta">
                  <h1 id="pokeNombre"></h1>
                  <h2 id="pokeId"></h2>
                  <h2 id="pokeTipos"></h2>
                  <h2 id="pokePeso"></h2>
                  <h2 id="pokeAltura"></h2>
                </div>
              </div>
          </div>

          <p id="error" style="display: none;">No se encontró el pokémon.</p>

      </main>

      <footer></footer>
    </div>

<script src="script.js"></script>
</body>
</html>
